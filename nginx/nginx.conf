server {
    listen 80;
    server_name propval.io.vn;

    # Docker internal DNS resolver — allows Nginx to start even if upstream isn't ready
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 50M;

    # API requests
    location /api/ {
        set $backend http://api:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SignalR WebSocket hub
    location /hub {
        set $backend http://api:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Swagger UI
    location /swagger {
        set $backend http://api:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (mapped at "/" in BE)
    location = /health {
        set $backend http://api:8080;
        proxy_pass $backend/;
        proxy_set_header Host $host;
    }

    # Static storage files served by BE
    location /storage/ {
        set $backend http://api:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (catch-all)
    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
