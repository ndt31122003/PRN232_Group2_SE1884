upstream api_servers {
    least_conn;
    server api:8080;
    keepalive 32;
}

upstream frontend_server {
    server frontend:80;
    keepalive 8;
}

# Sticky-session map for SignalR WebSocket connections.
# Routes the same client to the same API instance using a cookie.
map $cookie_srv_id $api_sticky {
    default api_servers;
}

server {
    listen 80;
    server_name propval.io.vn;

    client_max_body_size 50M;

    # ── API requests (round-robin / least_conn) ──────────
    location /api/ {
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    # ── SignalR WebSocket hub (sticky via ip_hash) ───────
    location /hub {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;

        # Sticky: keep same client on same upstream for WS lifetime
        proxy_set_header X-Forwarded-Server $host;
    }

    # ── Swagger UI ───────────────────────────────────────
    location /swagger {
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check ─────────────────────────────────────
    location = /health {
        proxy_pass http://api_servers/;
        proxy_set_header Host $host;
    }

    # ── Static storage files served by BE ────────────────
    location /storage/ {
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Google OAuth callback (needs same instance) ──────
    location /api/identity/google/ {
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ip_hash-like behavior via cookie
        proxy_set_header X-Forwarded-Server $host;
    }

    # ── Frontend (catch-all) ─────────────────────────────
    location / {
        proxy_pass http://frontend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
