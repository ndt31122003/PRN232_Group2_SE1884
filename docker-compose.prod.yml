services:
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s

  api:
    image: ${REGISTRY:-localhost:5000}/ebay-api:${TAG:-latest}
    build:
      context: ./BE
      dockerfile: PRN232_EbayClone/PRN232_EbayClone.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Redis=redis:6379
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 0
        order: stop-first

  frontend:
    image: ${REGISTRY:-localhost:5000}/ebay-frontend:${TAG:-latest}
    build:
      context: ./FE
      dockerfile: Dockerfile
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 5s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: start-first
        delay: 5s

configs:
  nginx_config:
    file: ./nginx/nginx.conf

volumes:
  redis_data:

networks:
  internal:
    driver: overlay
    attachable: true
